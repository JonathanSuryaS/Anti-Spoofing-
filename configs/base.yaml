# configs/base.yaml
# Base configuration — inherited by all model configs

project:
  name: face-anti-spoofing
  wandb_entity: your_wandb_username   # change this
  seed: 42

data:
  dataset: oulu_npu                   # oulu_npu | celeba_spoof | casia_fasd | replay_attack
  data_dir: data/processed
  protocol: 1                         # OULU-NPU protocol (1-4)
  image_size: 224
  num_workers: 4
  pin_memory: true

  augmentation:
    horizontal_flip: 0.5
    rotation: 10
    brightness: 0.2
    contrast: 0.2
    jpeg_compression: true            # critical for FAS — simulates attack artifacts
    motion_blur: true
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

training:
  max_epochs: 50
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-4
  scheduler: cosine                   # cosine | step | plateau
  warmup_epochs: 5
  early_stopping_patience: 10
  precision: 16                       # use fp16 for RTX 30xx

logging:
  log_every_n_steps: 10
  save_top_k: 3
  monitor: val_acer
  mode: min

paths:
  checkpoints: results/checkpoints
  logs: results/logs
  plots: results/plots
