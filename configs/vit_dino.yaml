# configs/vit_dino.yaml
# Track 3: ViT-B/16 fine-tuned from DINO self-supervised weights (SOTA)

defaults:
  - base

model:
  name: vit_base_patch16_224_dino
  pretrained: true           # DINO weights loaded via timm
  num_classes: 2
  dropout: 0.1
  freeze_backbone_epochs: 3

data:
  dataset: celeba_spoof      # ViT needs more data — use CelebA-Spoof
  batch_size: 16             # ViT is memory-heavy — reduce if OOM on 8GB VRAM
  image_size: 224

training:
  learning_rate: 1e-5        # very low LR — DINO weights are already strong
  max_epochs: 30
  precision: 16
