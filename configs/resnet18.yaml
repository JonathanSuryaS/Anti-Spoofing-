# configs/resnet18.yaml
# Track 1: ResNet-18 trained from scratch — your baseline

defaults:
  - base

model:
  name: resnet18
  pretrained: false          # true from scratch for this baseline
  num_classes: 2
  dropout: 0.5

training:
  batch_size: 64             # ResNet is lightweight, can afford larger batch
  learning_rate: 1e-3        # higher LR for from-scratch training
  max_epochs: 60
